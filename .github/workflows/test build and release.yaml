name: Flutter Test Build

on:
  workflow_dispatch:
    inputs:
      build_ios:
        description: Build unsigned iOS IPA
        required: true
        type: boolean
        default: false
      build_android:
        description: Build apk
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ==================== Android Job (Linux) ====================
  build-android:
    name: Build Android (Split APK)
    runs-on: ubuntu-latest
    if: ${{ inputs.build_android }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter (Beta x64)
        uses: subosito/flutter-action@v2
        with:
          channel: "beta"
          flutter-version: "3.43.0-0.2.pre"
          architecture: "x64"
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Setup keystore
        run: |
          echo '${{ secrets.KEYSTORE }}' | base64 --decode > android/app/apr-release-key.jks
          echo '${{ secrets.KEY_PROPERTIES }}' > android/key.properties

      - name: Build Android Split APKs
        run: flutter build apk --release --split-per-abi --flavor production

      - name: Rename Android APKs
        run: |
          VERSION=${GITHUB_REF_NAME:-Test-Build}
          mkdir -p build/artifacts
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "build/artifacts/bili-music-${VERSION}-armeabi-v7a.apk"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk   "build/artifacts/bili-music-${VERSION}-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk     "build/artifacts/bili-music-${VERSION}-x86_64.apk"

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bili-music-android
          path: build/artifacts/*.apk
          retention-days: 30

  # ==================== iOS Job (macOS) ====================
  build-ios:
    name: Build iOS (Unsigned IPA)
    runs-on: macos-latest
    if: ${{ inputs.build_ios }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "beta"
          flutter-version: "3.43.0-0.2.pre"
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build iOS
        run: |
          flutter build ios --release --no-codesign --flavor production
          ln -sf ./build/ios/iphoneos Payload  
          find Payload/Runner.app/Frameworks -type d -name "*.framework" -exec codesign --force --sign - --preserve-metadata=identifier,entitlements {} \;  
          zip -r9 bili-music.ipa Payload/runner.app

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bili-music-ios
          path: bili-music.ipa
          retention-days: 30

      - name: Show IPA Info
        run: ls -lh bili-music.ipa
