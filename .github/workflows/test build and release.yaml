name: Flutter Test Build

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ==================== Android Job (Linux) ====================
  build-android:
    name: Build Android (Split APK)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter (Beta x64)
        uses: subosito/flutter-action@v2
        with:
          channel: 'beta'
          flutter-version: '3.43.0-0.2.pre'
          architecture: 'x64'
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Setup keystore
        run: |
          echo '${{ secrets.KEYSTORE }}' | base64 --decode > android/app/apr-release-key.jks
          echo '${{ secrets.KEY_PROPERTIES }}' > android/key.properties

      - name: Build Android Split APKs
        run: flutter build apk --release --split-per-abi

      - name: Rename Android APKs
        run: |
          VERSION=${GITHUB_REF_NAME:-Test-Build}
          mkdir -p build/artifacts
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk "build/artifacts/bili-music-${VERSION}-armeabi-v7a.apk"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk   "build/artifacts/bili-music-${VERSION}-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk     "build/artifacts/bili-music-${VERSION}-x86_64.apk"

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bili-music-android
          path: build/artifacts/bili-music-*-*.apk
          retention-days: 30

  # ==================== iOS Job (macOS) ====================
  build-ios:
    name: Build iOS (Unsigned IPA)
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter (Beta x64)
        uses: subosito/flutter-action@v2
        with:
          channel: 'beta'
          flutter-version: '3.43.0-0.2.pre'
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build iOS IPA (Unsigned)
        run: flutter build ipa --release --no-codesign

      - name: Rename iOS IPA
        run: |
          VERSION=${GITHUB_REF_NAME:-Test-Build}
          mkdir -p build/artifacts
          cp build/ios/ipa/*.ipa "build/artifacts/bili-music-${VERSION}.ipa" || echo "⚠️ IPA 文件未找到"

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bili-music-ios
          path: build/artifacts/bili-music-*.ipa
          retention-days: 30
