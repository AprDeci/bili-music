name: Flutter Test Build

on:
  workflow_dispatch:
    inputs:
      build_ios:
        description: Build unsigned iOS IPA
        required: true
        type: boolean
        default: false
      build_android:
        description: Build apk
        required: true
        type: boolean
        default: false
      build_windows:
        description: Build Windows installer
        required: true
        type: boolean
        default: false
      build_linux_appimage:
        description: Build Linux AppImage
        required: true
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  # ==================== Android Job (Linux) ====================
  build-android:
    name: Build Android (Split APK)
    runs-on: ubuntu-latest
    if: ${{ inputs.build_android }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter (Beta x64)
        uses: subosito/flutter-action@v2
        with:
          channel: "beta"
          flutter-version: "3.43.0-0.2.pre"
          architecture: "x64"
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Setup keystore
        run: |
          echo '${{ secrets.KEYSTORE }}' | base64 --decode > android/app/apr-release-key.jks
          echo '${{ secrets.KEY_PROPERTIES }}' > android/key.properties

      - name: Build Android Split APKs
        run: flutter build apk --release --split-per-abi --flavor production

      - name: Rename Android APKs
        run: |
          VERSION=${GITHUB_REF_NAME:-Test-Build}
          mkdir -p build/artifacts
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-production-release.apk "build/artifacts/bili-music-${VERSION}-armeabi-v7a.apk"
          cp build/app/outputs/flutter-apk/app-arm64-v8a-production-release.apk "build/artifacts/bili-music-${VERSION}-arm64-v8a.apk"
          cp build/app/outputs/flutter-apk/app-x86_64-production-release.apk "build/artifacts/bili-music-${VERSION}-x86_64.apk"

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bili-music-android
          path: build/artifacts/*.apk
          retention-days: 30

  # ==================== iOS Job (macOS) ====================
  build-ios:
    name: Build iOS (Unsigned IPA)
    runs-on: macos-latest
    if: ${{ inputs.build_ios }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "beta"
          flutter-version: "3.43.0-0.2.pre"
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build iOS
        run: |
          flutter build ios --release --no-codesign
          rm -rf Payload
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/Runner.app
          find Payload/Runner.app/Frameworks -type d -name "*.framework" -exec codesign --force --sign - --preserve-metadata=identifier,entitlements {} \;
          zip -r9 bili-music.ipa Payload

      - name: Upload iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bili-music-ios
          path: bili-music.ipa
          retention-days: 30

      - name: Show IPA Info
        run: ls -lh bili-music.ipa

  # ==================== Windows Job ====================
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    if: ${{ inputs.build_windows }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "beta"
          flutter-version: "3.43.0-0.2.pre"
          cache: true

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build Windows
        run: flutter build windows --release

      - name: Setup Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows Installer
        shell: pwsh
        run: |
          $env:APP_VERSION = "Test-Build"
          iscc scripts/bilimusic.iss

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bilimusic-windows-installer
          path: build/artifacts/bilimusic-*-windows-setup.exe
          retention-days: 30

  # ==================== Linux Job ====================
  build-linux-appimage:
    name: Build Linux AppImage
    runs-on: ubuntu-22.04
    if: ${{ inputs.build_linux_appimage }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "beta"
          flutter-version: "3.43.0-0.2.pre"
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            curl \
            file \
            libfuse2 \
            libgtk-3-dev \
            liblzma-dev \
            ninja-build \
            pkg-config

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build AppImage
        run: |
          chmod +x scripts/package_appimage.sh
          scripts/package_appimage.sh "Test-Build"

      - name: Upload Linux AppImage Artifact
        uses: actions/upload-artifact@v4
        with:
          name: bili-music-linux-appimage
          path: build/artifacts/*.AppImage
          retention-days: 30
